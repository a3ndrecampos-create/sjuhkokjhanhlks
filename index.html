<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Pipas — Painel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Rajdhani:wght@600;700&display=swap');

        :root {
            --red:      #e8312a;
            --red-dim:  #7a1a16;
            --red-glow: rgba(232,49,42,0.25);
            --gold:     #f5c518;
            --gold-dim: rgba(245,197,24,0.15);
            --green:    #1db954;
            --blue:     #2563eb;
            --cyan:     #00e5cc;
            --bg0:      #07080d;
            --bg1:      #0d0e16;
            --bg2:      #12131e;
            --bg3:      #191a27;
            --border:   #1e2030;
            --border2:  #272838;
            --text:     #e2e4f0;
            --muted:    #5a5d7a;
            --label:    #8890b0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: var(--bg0);
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ── HEADER ── */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px 0;
            flex-shrink: 0;
        }
        #header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--red);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #header h1 span { color: var(--text); opacity: 0.5; }

        #btn-open-game {
            padding: 5px 14px;
            background: transparent;
            border: 1.5px solid var(--red);
            color: var(--red);
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
        }
        #btn-open-game:hover, #btn-open-game.active {
            background: var(--red);
            color: #fff;
            box-shadow: 0 0 12px var(--red-glow);
        }

        /* ── STATUS BAR ── */
        #status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 6px 12px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 12px;
            flex-shrink: 0;
        }
        .status-item { display: flex; align-items: center; gap: 6px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.8px; color: var(--label); text-transform: uppercase; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s; }
        .dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .dot.tikfinity{ background: #3b82f6; box-shadow: 0 0 6px #3b82f6; }
        .dot.festival { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
        #game-stats { font-size: 9.5px; color: var(--muted); font-weight: 500; }
        #game-stats span { color: var(--cyan); font-weight: 700; }

        /* ── DIVIDER LINE ── */
        .divider { height: 1px; background: var(--border); margin: 0 12px; flex-shrink: 0; }

        /* ── MAIN LAYOUT ── */
        #layout {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto auto auto 1fr;
            gap: 6px;
            padding: 6px 12px 8px;
            min-height: 0;
            overflow: hidden;
        }

        /* ── SECTIONS ── */
        .section {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .section.full { grid-column: 1 / -1; }
        .section-title {
            font-size: 9px;
            color: var(--red);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.2px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* ── FORMS ── */
        .form-row {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }
        label { font-size: 9.5px; color: var(--label); white-space: nowrap; }

        .input-dark, .select-dark {
            padding: 4px 7px;
            background: var(--bg0);
            color: var(--text);
            border: 1px solid var(--border2);
            border-radius: 5px;
            font-size: 10px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.15s;
        }
        .input-dark:focus, .select-dark:focus { border-color: var(--red); }
        .select-dark { height: 26px; }
        .input-dark::placeholder { color: var(--muted); }

        /* ── BUTTONS ── */
        .btn {
            padding: 4px 10px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 700;
            border-radius: 5px;
            font-size: 10px;
            font-family: 'Inter', sans-serif;
            transition: filter 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }
        .btn:hover { filter: brightness(1.15); }
        .btn:active { filter: brightness(0.9); }

        .btn-red    { background: var(--red); }
        .btn-green  { background: var(--green); }
        .btn-blue   { background: var(--blue); }
        .btn-gray   { background: var(--bg3); border: 1px solid var(--border2); }
        .btn-yellow { background: var(--gold); color: #000; }

        .btn-test {
            background: transparent;
            color: var(--green);
            border: 1px solid var(--green);
            padding: 2px 7px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9.5px;
            font-weight: 700;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .btn-test:hover { background: rgba(29,185,84,0.15); }

        .btn-play {
            background: transparent;
            color: #a78bfa;
            border: 1px solid #5b21b6;
            padding: 2px 7px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9.5px;
            font-weight: 700;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .btn-play:hover { background: rgba(139,92,246,0.15); }

        .btn-del {
            color: var(--muted);
            cursor: pointer;
            font-weight: 700;
            background: transparent;
            border: none;
            padding: 0 2px;
            font-size: 14px;
            line-height: 1;
            transition: color 0.15s;
        }
        .btn-del:hover { color: var(--red); }

        /* ── KINGS / FESTIVAL BTN ── */
        #btn-kings {
            padding: 6px 10px;
            background: transparent;
            border: 1.5px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            width: 100%;
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
        }
        #btn-kings:hover { background: var(--gold-dim); }
        #btn-kings.active { background: var(--red); color: #fff; border-color: var(--red-dim); box-shadow: 0 0 10px var(--red-glow); }

        /* ── AUDIO BTN ── */
        #btn-audio {
            padding: 4px 8px;
            background: var(--bg2);
            border: 1px solid var(--border2);
            color: var(--text);
            cursor: pointer;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            width: 100%;
            transition: border-color 0.15s;
        }
        #btn-audio:hover { border-color: var(--red); }
        #btn-audio.muted { color: var(--red); border-color: var(--red-dim); }

        /* ── LOOP ── */
        .loop-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 9.5px;
            font-weight: 700;
            color: var(--gold);
            cursor: pointer;
            user-select: none;
        }
        .loop-container input { cursor: pointer; width: 12px; height: 12px; accent-color: var(--gold); }

        /* ── PLAYER NAME ── */
        #player-name {
            padding: 5px 8px;
            background: var(--bg0);
            border: 1px solid var(--border2);
            color: var(--red);
            border-radius: 5px;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            width: 100%;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.15s;
        }
        #player-name:focus { border-color: var(--red); box-shadow: 0 0 0 2px var(--red-glow); }
        #player-name::placeholder { color: var(--muted); font-weight: 400; }

        /* ── QUICK ACTIONS GRID ── */
        .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .quick-btn {
            padding: 5px 2px;
            border: 1px solid var(--border2);
            background: var(--bg2);
            color: var(--text);
            cursor: pointer;
            border-radius: 5px;
            font-size: 9px;
            font-weight: 700;
            text-align: center;
            transition: background 0.15s, border-color 0.15s;
        }
        .quick-btn:hover { background: var(--bg3); }
        .quick-btn.cerol  { border-color: #d946ef; color: #d946ef; }
        .quick-btn.cerol:hover { background: rgba(217,70,239,0.1); }
        .quick-btn.fino   { border-color: #4ade80; color: #4ade80; }
        .quick-btn.fino:hover { background: rgba(74,222,128,0.1); }
        .quick-btn.chilena{ border-color: var(--gold); color: var(--gold); }
        .quick-btn.chilena:hover { background: var(--gold-dim); }

        /* ── EVENT LIST ── */
        .event-list-container {
            max-height: 82px;
            overflow-y: auto;
            background: var(--bg0);
            border: 1px solid var(--border);
            border-radius: 5px;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
        }
        .event-list-container::-webkit-scrollbar { width: 4px; }
        .event-list-container::-webkit-scrollbar-track { background: transparent; }
        .event-list-container::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            font-size: 9.5px;
            border-bottom: 1px solid var(--border);
            gap: 4px;
        }
        .event-item:last-child { border-bottom: none; }
        .event-item-label { flex: 1; min-width: 0; }
        .event-item-label strong { color: var(--cyan); }
        .event-item-label .ev-audio { font-size: 8.5px; color: var(--muted); margin-top: 1px; }
        .event-actions-group { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }

        /* ── RANKING ── */
        #mini-ranking {
            font-size: 10px;
            color: var(--muted);
            overflow-y: auto;
            max-height: 100%;
            flex: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--border2) transparent;
        }
        .rank-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
            border-bottom: 1px solid var(--border);
        }
        .rank-line:last-child { border-bottom: none; }
        .rank-name { color: var(--text); font-weight: 500; }
        .rank-cuts { color: var(--cyan); font-weight: 700; font-size: 10px; }

        /* ── SUB-DIVIDERS ── */
        .section-subtitle {
            font-size: 8.5px;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.8px;
            margin-top: 4px;
            padding-top: 5px;
            border-top: 1px solid var(--border);
        }

        /* scrollbar global */
        * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

        /* ── AUDIO PICKER MODAL ── */
        #audio-modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        #audio-modal-backdrop.open { display: flex; }

        #audio-modal {
            background: var(--bg1);
            border: 1px solid var(--border2);
            border-radius: 10px;
            width: 340px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 40px rgba(0,0,0,0.7);
            overflow: hidden;
        }
        #audio-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px 8px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #audio-modal-header span {
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1px;
        }
        #audio-modal-close {
            background: transparent; border: none; color: var(--muted);
            font-size: 18px; cursor: pointer; line-height: 1; padding: 0 2px;
            transition: color 0.15s;
        }
        #audio-modal-close:hover { color: var(--red); }

        #audio-modal-search {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #audio-search-input {
            width: 100%;
            padding: 5px 9px;
            background: var(--bg0);
            border: 1px solid var(--border2);
            border-radius: 5px;
            color: var(--text);
            font-size: 10px;
            font-family: 'Inter', sans-serif;
            outline: none;
        }
        #audio-search-input:focus { border-color: var(--red); }
        #audio-search-input::placeholder { color: var(--muted); }

        #audio-modal-folder {
            padding: 5px 12px;
            font-size: 8.5px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        #audio-modal-folder span { color: var(--cyan); }

        #audio-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
        }

        .audio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: default;
            border: 1px solid transparent;
            transition: background 0.12s, border-color 0.12s;
            margin-bottom: 2px;
        }
        .audio-item:hover { background: var(--bg3); border-color: var(--border2); }
        .audio-item.selected { background: rgba(0,229,204,0.07); border-color: var(--cyan); }

        .audio-item-icon { font-size: 13px; flex-shrink: 0; }
        .audio-item-name {
            flex: 1;
            font-size: 10px;
            color: var(--text);
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .audio-item.selected .audio-item-name { color: var(--cyan); }

        .audio-item-btns { display: flex; gap: 5px; flex-shrink: 0; }
        .audio-btn-play {
            background: transparent;
            color: #a78bfa;
            border: 1px solid #5b21b6;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            transition: background 0.12s;
        }
        .audio-btn-play:hover { background: rgba(139,92,246,0.2); }
        .audio-btn-play.playing { color: var(--gold); border-color: var(--gold); }

        .audio-btn-select {
            background: transparent;
            color: var(--green);
            border: 1px solid var(--green);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            transition: background 0.12s;
        }
        .audio-btn-select:hover { background: rgba(29,185,84,0.15); }

        #audio-modal-footer {
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
        }
        #audio-selected-display {
            font-size: 9px;
            color: var(--muted);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #audio-selected-display.has-value { color: var(--cyan); }
        #audio-modal-confirm {
            padding: 5px 14px;
            background: var(--green);
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: filter 0.15s;
            flex-shrink: 0;
        }
        #audio-modal-confirm:hover { filter: brightness(1.15); }
        #audio-modal-confirm:disabled { opacity: 0.4; cursor: default; filter: none; }

        /* ── AUDIO PICKER TRIGGER BTN ── */
        .btn-pick-audio {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px;
            background: var(--bg2);
            border: 1px solid var(--border2);
            color: var(--label);
            border-radius: 5px;
            cursor: pointer;
            font-size: 9.5px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            transition: border-color 0.15s, color 0.15s;
        }
        .btn-pick-audio:hover { border-color: #a78bfa; color: #a78bfa; }
        .btn-pick-audio.has-audio { border-color: var(--cyan); color: var(--cyan); }
    </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
    <h1>🪁 Batalha de Pipas <span>— PAINEL</span></h1>
    <button id="btn-open-game" onclick="toggleGame()">🎮 ABRIR JOGO</button>
</div>

<!-- STATUS BAR -->
<div id="status-bar">
    <div class="status-item"><div id="gameDot" class="dot"></div> Jogo</div>
    <div class="status-item"><div id="tikfinityDot" class="dot"></div> Tikfinity</div>
    <div class="status-item"><div id="festivalDot" class="dot"></div> Festival</div>
    <div id="game-stats">Pipas: <span id="stat-pipas">0</span> &nbsp;|&nbsp; Fila: <span id="stat-fila">0</span></div>
</div>

<div class="divider"></div>

<div id="layout">

    <!-- Col Esq: Controles -->
    <div class="section">
        <div class="section-title">🎮 Controles</div>
        <button id="btn-kings" onclick="toggleFestival()">👑 KINGS: DESATIVADO</button>
        <div style="display:flex; gap:5px; align-items:center; flex-wrap:wrap;">
            <label class="loop-container">
                <input type="checkbox" id="festivalLoopCheck" onchange="sendLoopState()"> LOOP
            </label>
            <button id="btn-audio" style="flex:1;" onclick="toggleAudio()">🔊 ÁUDIO: LIGADO</button>
        </div>
        <button class="btn btn-red" style="width:100%; margin-top:2px;" onclick="resetRanking()">🗑️ RESETAR PLACAR</button>
    </div>

    <!-- Col Dir: Spawnar -->
    <div class="section">
        <div class="section-title">➕ Spawnar Jogador</div>
        <input type="text" id="player-name" placeholder="NOME DO JOGADOR">
        <div style="display:flex; gap:4px;">
            <button class="btn btn-red" style="flex:1;" onclick="playerSelfSpawn()">Normal</button>
            <button class="btn btn-blue" style="flex:1;" onclick="playerSpawnLarge()">Grande</button>
        </div>
        <div class="quick-actions">
            <button class="quick-btn cerol"   onclick="quickAction('SPAWN_CEROL')">🌸 Cerol</button>
            <button class="quick-btn fino"    onclick="quickAction('SPAWN_CEROL_FINO')">💚 Fino</button>
            <button class="quick-btn chilena" onclick="quickAction('SPAWN_CHILENA')">⭐ Chilena</button>
            <button class="quick-btn cerol"   onclick="quickAction('SPAWN_LARGE_CEROL')">🌸 G+Cerol</button>
            <button class="quick-btn fino"    onclick="quickAction('SPAWN_LARGE_CEROL_FINO')">💚 G+Fino</button>
            <button class="quick-btn chilena" onclick="quickAction('SPAWN_LARGE_CHILENA')">⭐ G+Chil.</button>
        </div>
    </div>

    <!-- Likes -->
    <div class="section">
        <div class="section-title">⚡ Likes</div>
        <div class="form-row">
            <label>A cada</label>
            <input type="number" id="likeThresholdInput" class="input-dark" style="width:48px;text-align:center;" min="1" value="10">
            <label>likes →</label>
            <select id="likeActionSelect" class="select-dark" style="flex:1;">
                <option value="CURA_15">+15% HP</option>
                <option value="CURA_50">+50% HP</option>
                <option value="CURA_100">+100% HP</option>
                <option value="SPAWN_RANDOM">Spawn Aleat.</option>
            </select>
        </div>
        <div class="form-row">
            <button class="btn btn-green" style="flex:1;" onclick="saveLikeConfig()">SALVAR</button>
            <button class="btn-test" onclick="testTrigger('curtida_like')">Testar</button>
        </div>
    </div>

    <!-- Membro + Compartilhar -->
    <div class="section">
        <div class="section-title">👑 Membro</div>
        <div class="form-row">
            <select id="memberActionSelect" class="select-dark" style="flex:1;">
                <option value="SPAWN_RANDOM">Spawn Aleat.</option>
                <option value="SPAWN_LARGE">Pipa Grande</option>
                <option value="SPAWN_CEROL">+Cerol Rosa</option>
                <option value="SPAWN_LARGE_CEROL">G+Cerol</option>
                <option value="SPAWN_CEROL_FINO">+Cerol Fino</option>
                <option value="SPAWN_LARGE_CEROL_FINO">G+Fino</option>
                <option value="SPAWN_CHILENA">+Chilena</option>
                <option value="SPAWN_LARGE_CHILENA">G+Chilena</option>
            </select>
        </div>
        <div class="form-row">
            <button class="btn btn-green" style="flex:1;" onclick="saveMemberConfig()">SALVAR</button>
            <button class="btn-test" onclick="testTrigger('member')">Testar</button>
        </div>

        <div class="section-subtitle">📤 Compartilhar</div>
        <div class="form-row">
            <select id="shareActionSelect" class="select-dark" style="flex:1;">

<script>
// ============================================================
// CANAL DE COMUNICAÇÃO COM O JOGO
// ============================================================
const gameChannel = new BroadcastChannel('batalha_pipas');
let jogoOnline = false;
let festivalAtivo = false;
let audioMutado = false;

function pingGame() { gameChannel.postMessage({ type: 'PING' }); }
setInterval(pingGame, 3000);
pingGame();

let gameOnlineTimeout = null;
function markGameOnline() {
    jogoOnline = true;
    document.getElementById('gameDot').className = 'dot online';
    clearTimeout(gameOnlineTimeout);
    gameOnlineTimeout = setTimeout(() => {
        jogoOnline = false;
        document.getElementById('gameDot').className = 'dot';
    }, 7000);
}

gameChannel.onmessage = (event) => {
    const msg = event.data;
    if (!msg || !msg.type) return;
    switch(msg.type) {
        case 'PONG':
            markGameOnline();
            break;
        case 'GAME_STATE':
            markGameOnline();
            festivalAtivo = msg.festivalAtivo;
            updateFestivalBtn();
            document.getElementById('stat-pipas').textContent = msg.pipasCount;
            document.getElementById('stat-fila').textContent = msg.queueCount;
            break;
        case 'WIN_STATS_UPDATE':
            updateMiniRanking(msg.winStats);
            break;
        case 'FESTIVAL_CHANGED':
            festivalAtivo = msg.festivalAtivo;
            updateFestivalBtn();
            break;
    }
};

function updateFestivalBtn() {
    const btn = document.getElementById('btn-kings');
    const dot = document.getElementById('festivalDot');
    if (festivalAtivo) {
        btn.innerHTML = "👑 KINGS: ATIVADO";
        btn.classList.add('active');
        dot.className = 'dot festival';
    } else {
        btn.innerHTML = "👑 KINGS: DESATIVADO";
        btn.classList.remove('active');
        dot.className = 'dot';
    }
}

function updateMiniRanking(winStats) {
    if (!winStats) return;
    const sorted = Object.entries(winStats).sort((a, b) => b[1].cuts - a[1].cuts);
    const container = document.getElementById('mini-ranking');
    if (sorted.length === 0) {
        container.innerHTML = '<em style="color:var(--muted);">Nenhum corte registrado ainda.</em>';
        return;
    }
    const medals = ['🥇','🥈','🥉'];
    container.innerHTML = sorted.slice(0, 10).map(([name, data], i) =>
        `<div class="rank-line"><span class="rank-name">${medals[i] || `${i+1}º`} ${name}</span><span class="rank-cuts">${data.cuts} cortes</span></div>`
    ).join('');
}

function send(msg) { gameChannel.postMessage(msg); }

// ============================================================
// ESTADO LOCAL
// eventMappings: { key: { action, audio? } }
// Compatibilidade: suporta valores string legados e novos objetos
// ============================================================
function loadMappings() {
    try {
        const raw = JSON.parse(localStorage.getItem('pipa_events'));
        if (!raw) return null;
        // Migrar formato antigo (string) para novo (objeto)
        const migrated = {};
        for (const [k, v] of Object.entries(raw)) {
            if (typeof v === 'string') migrated[k] = { action: v, audio: '' };
            else migrated[k] = v;
        }
        return migrated;
    } catch { return null; }
}

let eventMappings = loadMappings() || {
    "member":       { action: "SPAWN_RANDOM", audio: "" },
    "compartilhar": { action: "SPAWN_RANDOM", audio: "" },
    "5655":         { action: "CEROL",        audio: "" },
    "rose":         { action: "CEROL",        audio: "" },
    "curtida_like": { action: "CURA_15",      audio: "" }
};

// Helpers para compatibilidade
function getAction(key) {
    const v = eventMappings[key];
    return v ? (typeof v === 'string' ? v : v.action) : undefined;
}
function getAudio(key) {
    const v = eventMappings[key];
    return v ? (typeof v === 'string' ? '' : (v.audio || '')) : '';
}

let likeThreshold       = parseInt(localStorage.getItem('pipa_like_threshold')) || 10;
let duracaoPrepMinutos  = parseInt(localStorage.getItem('pipa_fest_prep'))      || 2;
let duracaoCombatMinutos= parseInt(localStorage.getItem('pipa_fest_combat'))    || 5;

// Inicializa campos
document.getElementById('likeThresholdInput').value = likeThreshold;
document.getElementById('festPrepInput').value      = duracaoPrepMinutos;
document.getElementById('festCombatInput').value    = duracaoCombatMinutos;

const likeAct = getAction('curtida_like');
if (likeAct) document.getElementById('likeActionSelect').value = likeAct;
const memberAct = getAction('member');
if (memberAct) document.getElementById('memberActionSelect').value = memberAct;
const shareAct = getAction('compartilhar');
if (shareAct) document.getElementById('shareActionSelect').value = shareAct;

renderEvents();

setTimeout(() => sendAllSettings(), 500);

function saveMappings() {
    localStorage.setItem('pipa_events', JSON.stringify(eventMappings));
}

function buildEventMappingsForGame() {
    // Para o jogo, envia só action (string) por chave
    const flat = {};
    for (const [k, v] of Object.entries(eventMappings)) {
        flat[k] = typeof v === 'string' ? v : v.action;
    }
    return flat;
}

function sendAllSettings() {
    send({
        type: 'UPDATE_SETTINGS',
        eventMappings: buildEventMappingsForGame(),
        likeThreshold,
        festPrepMin:   duracaoPrepMinutos,
        festCombatMin: duracaoCombatMinutos,
    });
}

function saveLikeConfig() {

    localStorage.setItem('pipa_like_threshold', likeThreshold);
    const act = document.getElementById('likeActionSelect').value;

    saveMappings();
    send({ type: 'UPDATE_SETTINGS', likeThreshold, eventMappings: buildEventMappingsForGame() });

function saveMemberConfig() {
    // Corrigido: chave "member" (não "membro") para ser reconhecida pelo painel
    const act = document.getElementById('memberActionSelect').value;
    eventMappings["member"] = { action: act, audio: getAudio("member") };
    // Remove chave antiga "membro" se existir
    delete eventMappings["membro"];
    saveMappings();
    send({ type: 'UPDATE_SETTINGS', eventMappings: buildEventMappingsForGame() });
    renderEvents();
}

function saveShareConfig() {
    const act = document.getElementById('shareActionSelect').value;
    eventMappings["compartilhar"] = { action: act, audio: getAudio("compartilhar") };
    saveMappings();
    send({ type: 'UPDATE_SETTINGS', eventMappings: buildEventMappingsForGame() });
    renderEvents();

function addEvent() {
    const cmd    = document.getElementById('cmdInput').value.trim().toLowerCase();
    const act    = document.getElementById('actionSelect').value;
    const audio  = currentSelectedAudio;
    const repeat = Math.max(1, parseInt(document.getElementById('repeatInput').value) || 1);
    if (!cmd) return;
    eventMappings[cmd] = { action: act, audio, repeat };
    saveMappings();
    send({ type: 'UPDATE_SETTINGS', eventMappings: buildEventMappingsForGame() });
    document.getElementById('cmdInput').value = '';
    document.getElementById('repeatInput').value = '1';
    document.getElementById('giftSelector').value = '';
    currentSelectedAudio = '';
    updatePickerBtn('');
    renderEvents();
}

function removeEvent(cmd) {
    delete eventMappings[cmd];
    saveMappings();
    send({ type: 'UPDATE_SETTINGS', eventMappings: buildEventMappingsForGame() });
    renderEvents();
}

function renderEvents() {
    const entries = Object.entries(eventMappings);
    if (entries.length === 0) {
        document.getElementById('event-list').innerHTML =
            '<div style="padding:6px 8px;font-size:9.5px;color:var(--muted);">Nenhum evento cadastrado.</div>';
        return;
    }
    document.getElementById('event-list').innerHTML = entries.map(([cmd, v]) => {
        const act    = typeof v === 'string' ? v : v.action;
        const audio  = typeof v === 'string' ? '' : (v.audio || '');
        const repeat = typeof v === 'object' && v.repeat > 1 ? v.repeat : 1;
        const audioName = audio ? audio.split('/').pop().replace('.mp3','').replace('.wav','') : '';
        const metaHtml = [
            repeat > 1 ? `🔁 ${repeat}x` : '',
            audio ? `🔊 ${audioName}` : ''
        ].filter(Boolean).join(' &nbsp;·&nbsp; ');
        const safeCmd = cmd.replace(/'/g, "\\'");
        return `<div class="event-item">
            <div class="event-item-label">
                <strong>${cmd}</strong> → ${act}
                ${metaHtml ? `<div class="ev-audio">${metaHtml}</div>` : ''}
            </div>
            <div class="event-actions-group">
                <button class="btn-test" onclick="testTrigger('${safeCmd}')">Testar</button>
                <button class="btn-play" onclick="openAudioModal('${safeCmd}')" title="${audio ? 'Trocar som' : 'Adicionar som'}">🔊</button>
                <button class="btn-del"  onclick="removeEvent('${safeCmd}')">&times;</button>
            </div>
        </div>`;
    }).join('');
}

// Lock para evitar que o mesmo user+action dispare em cascata
// enquanto o loop de repetições ainda está em andamento.
const _pendingRepeats = new Set();

function executeRepeated(action, user, avatar, repeat, audio) {
    const lockKey = `${action}|${user}`;
    if (_pendingRepeats.has(lockKey)) return; // já em execução para esse par
    _pendingRepeats.add(lockKey);

    repeat = Math.max(1, repeat || 1);
    // Toca o áudio uma vez no início
    if (audio) playAudio(audio);

    for (let i = 0; i < repeat; i++) {
        setTimeout(() => {
            send({ type: 'EXECUTE_ACTION', action, user, avatar });
            if (i === repeat - 1) _pendingRepeats.delete(lockKey); // libera ao final
        }, i * 500);
    }
}

function testTrigger(key) {
    const v = eventMappings[key];
    if (!v) return;
    const action = typeof v === 'string' ? v : v.action;
    const audio  = typeof v === 'string' ? '' : (v.audio || '');
    const repeat = typeof v === 'object' && v.repeat > 1 ? v.repeat : 1;
    let testUser = "TESTE_LIVE";
    if (key === "curtida_like") testUser = "LIKES_TEST";
    if (key === "member")       testUser = "MEMBRO_TEST";
    if (key === "compartilhar") testUser = "SHARE_TEST";
    executeRepeated(action, testUser, 'https://www.tiktok.com/favicon.ico', repeat, audio);
}

function previewAudio(path) {
    if (!path) return;
    playAudio(path);
}

let currentPreviewAudio = null;
let currentPlayPromise = null;
function playAudio(path) {
    // Guarda referência do áudio que está tocando agora, para cortá-lo
    // com segurança (sem disparar o erro play()/pause()) antes de iniciar o novo.
    const previous = currentPreviewAudio;
    const previousPromise = currentPlayPromise;

    const a = new Audio(path);
    currentPreviewAudio = a;

    const stopPrevious = () => {
        if (previous) {
            try { previous.pause(); previous.currentTime = 0; } catch(e) {}
        }
    };

    // O navegador só permite pause() com segurança depois que a Promise
    // de play() do áudio anterior foi resolvida (ou rejeitada). Por isso
    // esperamos ela "assentar" antes de cortar o som anterior, mesmo que
    // isso leve poucos milissegundos — assim nunca disparamos o erro
    // "play() interrupted by pause()".
    if (previousPromise && typeof previousPromise.then === 'function') {
        previousPromise.then(stopPrevious, stopPrevious);
    } else {
        stopPrevious();
    }

    currentPlayPromise = a.play();
    currentPlayPromise.catch(e => {
        // AbortError/NotAllowedError ao trocar de som rapidamente não é um
        // erro real para o usuário — nunca mostramos alert, só logamos.
        console.warn("Não foi possível tocar o áudio:", path, e && e.message);
    });
}

// Função separada para o preview do modal, onde QUEREMOS parar o som anterior
// ao trocar de seleção (esse pause() controlado é intencional e seguro).
function stopPreviewAudio() {
    if (currentPreviewAudio) {
        try { currentPreviewAudio.pause(); } catch(e) {}
        currentPreviewAudio = null;
    }
}

const AUDIO_BASE = "assets/audio/";

function buildAudioList(filter = "") {
    const list = document.getElementById('audio-list');
    const filtered = filter
        ? AUDIO_FILES.filter(a => a.label.toLowerCase().includes(filter.toLowerCase()) || a.file.toLowerCase().includes(filter.toLowerCase()))
        : AUDIO_FILES;

    if (filtered.length === 0) {
        list.innerHTML = '<div style="padding:12px;text-align:center;color:var(--muted);font-size:10px;">Nenhum som encontrado.</div>';
        return;
    }

    list.innerHTML = filtered.map(a => {
        const path = AUDIO_BASE + a.file;
        const isSelected = currentSelectedAudio === path;
        return `<div class="audio-item${isSelected ? ' selected' : ''}" data-path="${path}" id="ai-${a.file}">
            <div class="audio-item-icon">🎵</div>
            <div class="audio-item-name" title="${a.file}">${a.label}</div>
            <div class="audio-item-btns">
                <button class="audio-btn-play" onclick="modalPlayAudio('${path}', '${a.file}', this)" title="Ouvir">▶</button>
                <button class="audio-btn-select" onclick="selectAudio('${path}', '${a.label}')" title="Selecionar">✔</button>
            </div>
        </div>`;
    }).join('');
}

function filterAudioList(val) { buildAudioList(val); }

function modalPlayAudio(path, file, btn) {
    // Para botão anterior
    if (modalPlayingBtn && modalPlayingBtn !== btn) {
        modalPlayingBtn.textContent = '▶';
        modalPlayingBtn.classList.remove('playing');
    }
    if (currentPreviewAudio) { currentPreviewAudio.pause(); currentPreviewAudio = null; }

    if (btn.textContent === '⏹') {
        btn.textContent = '▶';
        btn.classList.remove('playing');
        modalPlayingBtn = null;
        return;
    }

    try {
        const a = new Audio(path);
        currentPreviewAudio = a;
        btn.textContent = '⏹';
        btn.classList.add('playing');
        modalPlayingBtn = btn;
        a.play().catch(() => { btn.textContent = '▶'; btn.classList.remove('playing'); });
        a.onended = () => { btn.textContent = '▶'; btn.classList.remove('playing'); modalPlayingBtn = null; };
    } catch(e) { btn.textContent = '▶'; }
}

function selectAudio(path, label) {
    currentSelectedAudio = path;
    // Visual: marca o item
    document.querySelectorAll('.audio-item').forEach(el => el.classList.remove('selected'));
    const el = document.getElementById('ai-' + path.replace(AUDIO_BASE, ''));
    if (el) el.classList.add('selected');
    // Footer
    const disp = document.getElementById('audio-selected-display');
    disp.textContent = "✔ " + label;
    disp.classList.add('has-value');
    document.getElementById('audio-modal-confirm').disabled = false;
}

function clearAudioSelection() {
    currentSelectedAudio = '';
    document.querySelectorAll('.audio-item').forEach(el => el.classList.remove('selected'));
    const disp = document.getElementById('audio-selected-display');
    disp.textContent = 'Nenhum som selecionado';
    disp.classList.remove('has-value');
    document.getElementById('audio-modal-confirm').disabled = true;
}

function confirmAudioSelection() {
    closeAudioModal();
    updatePickerBtn(currentSelectedAudio);
}

function updatePickerBtn(path) {
    const btn = document.getElementById('btn-pick-audio');
    if (path) {
        const name = path.split('/').pop().replace('.mp3','').replace('.wav','');
        btn.innerHTML = `🔊 ${name}`;
        btn.classList.add('has-audio');
    } else {
        btn.innerHTML = '🔊 Escolher som...';
        btn.classList.remove('has-audio');
    }
}

function openAudioModal(callbackKey) {
    // Se veio de um evento existente, pré-seleciona
    if (callbackKey) {
        window._audioModalCallback = callbackKey;
        currentSelectedAudio = getAudio(callbackKey);
    } else {
        window._audioModalCallback = null;
    }
    buildAudioList();
    // Pré-seleciona no footer se já há audio
    if (currentSelectedAudio) {
        const found = AUDIO_FILES.find(a => AUDIO_BASE + a.file === currentSelectedAudio);
        if (found) {
            const disp = document.getElementById('audio-selected-display');
            disp.textContent = "✔ " + found.label;
            disp.classList.add('has-value');
            document.getElementById('audio-modal-confirm').disabled = false;
        }
    } else {
        clearAudioSelection();
    }
    document.getElementById('audio-search-input').value = '';
    document.getElementById('audio-modal-backdrop').classList.add('open');
}

function closeAudioModal() {
    if (currentPreviewAudio) { currentPreviewAudio.pause(); currentPreviewAudio = null; }
    if (modalPlayingBtn) { modalPlayingBtn.textContent = '▶'; modalPlayingBtn.classList.remove('playing'); modalPlayingBtn = null; }
    document.getElementById('audio-modal-backdrop').classList.remove('open');
    // Se veio de um evento existente, salva
    if (window._audioModalCallback) {
        const key = window._audioModalCallback;
        const v = eventMappings[key];
        if (v) {
            eventMappings[key] = {
                action: typeof v === 'string' ? v : v.action,
                audio: currentSelectedAudio,
                repeat: typeof v === 'object' ? (v.repeat || 1) : 1
            };
            saveMappings();
            send({ type: 'UPDATE_SETTINGS', eventMappings: buildEventMappingsForGame() });
            renderEvents();
        }
        window._audioModalCallback = null;
    }
}

function handleBackdropClick(e) {
    if (e.target === document.getElementById('audio-modal-backdrop')) closeAudioModal();
}

function syncGiftInput() {
    const sel = document.getElementById('giftSelector').value;
    if (sel && sel !== "CUSTOM") document.getElementById('cmdInput').value = sel;
    else if (sel === "CUSTOM")   document.getElementById('cmdInput').value = "";
}

// ============================================================
// TIKFINITY
// ============================================================
let likeCounter  = 0;
let likeCooldown = false;

function connectTikFinity() {
    const socket = new WebSocket('ws://localhost:21213/');
    socket.onopen = () => {
        document.getElementById('tikfinityDot').className = 'dot tikfinity';
        send({ type: 'TIKFINITY_STATUS', online: true });
    };
    socket.onmessage = (event) => {
        const res = JSON.parse(event.data);
        const d   = res.data || res;
        if (!d) return;

        let user   = d.nickname || d.uniqueId || "Jogador";
        let avatar = d.profilePictureUrl || d.profilePicUrl || d.avatar || null;
        const ev   = (res.event || "").toLowerCase();

        if (ev === "gift") {
            const giftId   = String(d.giftId   || "");
            const giftName = String(d.giftName || "").toLowerCase().trim();
            let triggerKey = eventMappings[giftId] ? giftId : (eventMappings[giftName] ? giftName : null);
            if (triggerKey) {
                const v      = eventMappings[triggerKey];
                const action = getAction(triggerKey);
                const audio  = getAudio(triggerKey);
                const repeat = typeof v === 'object' && v.repeat > 1 ? v.repeat : 1;
                executeRepeated(action, user, avatar, repeat, audio);
            }
            return;
        }

        let triggerKey = "";
        let count = 1;
        if      (ev === "chat")    triggerKey = (d.comment || "").toLowerCase().trim();
        else if (ev === "command") triggerKey = (d.command || "").toLowerCase();
        else if (ev === "share")   triggerKey = "compartilhar";
        else if (ev === "like")    { triggerKey = "curtida_like"; count = parseInt(d.likeCount) || 1; }
        // Tikfinity envia "member" para novos membros
        else if (ev === "member" || ev === "subscribe") triggerKey = "member";
        else triggerKey = ev;

        if (!triggerKey) return;
        const action = getAction(triggerKey);
        if (action) {
            const v      = eventMappings[triggerKey];
            const audio  = getAudio(triggerKey);
            const repeat = typeof v === 'object' && v.repeat > 1 ? v.repeat : 1;
            if (triggerKey === "curtida_like") {
                if (likeCooldown) return;
                likeCounter += count;
                if (likeCounter >= likeThreshold) {
                    likeCooldown = true;
                    executeRepeated(action, user, avatar, repeat, audio);
                    setTimeout(() => { likeCooldown = false; likeCounter = 0; }, 2000);
                }
            } else {
                executeRepeated(action, user, avatar, repeat, audio);
            }
        }
    };
    socket.onclose = () => {
        document.getElementById('tikfinityDot').className = 'dot';
        send({ type: 'TIKFINITY_STATUS', online: false });
        setTimeout(connectTikFinity, 5000);
    };
}

connectTikFinity();

let gameWindowOpen = false;

function toggleGame() {
    if (window.electronAPI) {
        window.electronAPI.toggleGameWindow();
        gameWindowOpen = !gameWindowOpen;
        updateGameBtn();
    } else {
        window.open('jogo.html', 'jogo', 'width=1280,height=800');
    }
}

function updateGameBtn() {
    const btn = document.getElementById('btn-open-game');
    if (gameWindowOpen) {
        btn.textContent = '🎮 FECHAR JOGO';
        btn.classList.add('active');
    } else {
        btn.textContent = '🎮 ABRIR JOGO';
        btn.classList.remove('active');
    }
}

if (window.electronAPI) {
    window.electronAPI.onGameClosed(() => {
        gameWindowOpen = false;
        updateGameBtn();
    });
}
