<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Pipas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Titlebar customizada */
        #titlebar {
            width: 100%;
            height: 32px;
            background: #0a0a12;
            border-bottom: 1px solid #ff3030;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            flex-shrink: 0;
            -webkit-app-region: drag;
            user-select: none;
        }
        #titlebar span {
            font-family: 'Segoe UI', Arial;
            font-size: 12px;
            font-weight: bold;
            color: #ff3030;
            letter-spacing: 1px;
        }
        #titlebar-right {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }
        .tb-btn {
            font-size: 10px;
            font-weight: bold;
            font-family: 'Segoe UI', Arial;
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #161616;
            color: #888;
            cursor: pointer;
        }
        .tb-btn:hover { background: #222; color: #fff; }
        .tb-btn.toggle-active { background: #ff3030; color: #fff; border-color: #8b0000; }

        /* Botões de controle da janela (minimize/maximize/close) */
        .wm-btn {
            font-size: 11px;
            font-weight: bold;
            font-family: 'Segoe UI', Arial;
            width: 28px;
            height: 22px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #161616;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wm-btn:hover { background: #333; color: #fff; }
        .wm-btn.close:hover { background: #c0392b; color: #fff; border-color: #8b0000; }

        /* Área principal: só o jogo */
        #main {
            flex: 1;
            width: 100%;
            overflow: hidden;
        }

        #frame-game {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div id="titlebar">
        <span>🪁 BATALHA DE PIPAS</span>
        <div id="titlebar-right">
            <button class="tb-btn" id="btn-toggle-panel" onclick="togglePanel()">⚙️ Painel</button>
            <button class="wm-btn" onclick="window.electronAPI?.minimize()" title="Minimizar">─</button>
            <button class="wm-btn" onclick="window.electronAPI?.maximize()" title="Maximizar">□</button>
            <button class="wm-btn close" onclick="window.electronAPI?.close()" title="Fechar">✕</button>
        </div>
    </div>

    <div id="main">
        <iframe id="frame-game" src="jogo.html" allow="autoplay; microphone"></iframe>
    </div>

<script>
    let panelOpen = false;

    function togglePanel() {
        // Se estiver rodando no Electron, usa IPC para abrir janela flutuante
        if (window.electronAPI) {
            window.electronAPI.togglePanelWindow();
            panelOpen = !panelOpen;
            updatePanelBtn();
        } else {
            // Fallback para browser: abre numa nova aba/popup
            window.open('painel.html', 'painel', 'width=380,height=800');
        }
    }

    function updatePanelBtn() {
        const btn = document.getElementById('btn-toggle-panel');
        if (panelOpen) {
            btn.classList.add('toggle-active');
            btn.textContent = '⚙️ Painel ✓';
        } else {
            btn.classList.remove('toggle-active');
            btn.textContent = '⚙️ Painel';
        }
    }

    // Quando o usuário fechar o painel pelo X da janela,
    // o main.js avisa via IPC e atualizamos o botão
    if (window.electronAPI) {
        window.electronAPI.onPanelClosed(() => {
            panelOpen = false;
            updatePanelBtn();
        });
    }
</script>
</body>
</html>
