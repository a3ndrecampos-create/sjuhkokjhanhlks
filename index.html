<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Pipas - PAINEL</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            background: #0a0a12;
            font-family: 'Segoe UI', Arial;
            color: white;
            height: 100vh;
            overflow: hidden;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        h1 {
            text-align: center;
            font-size: 13px;
            color: #ff3030;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid #ff3030;
            padding-bottom: 6px;
            flex-shrink: 0;
        }

        /* Status bar */
        #status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.04);
            border: 1px solid #222;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 10px;
            flex-shrink: 0;
        }
        .status-item { display: flex; align-items: center; gap: 5px; font-weight: bold; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; }
        .dot.online { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        .dot.tikfinity { background: #3498db; box-shadow: 0 0 5px #3498db; }
        .dot.festival { background: #ffd700; box-shadow: 0 0 5px #ffd700; }
        #game-stats { font-size: 10px; color: #888; }

        /* Layout principal em 2 colunas */
        #layout {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto auto auto 1fr;
            gap: 5px;
            min-height: 0;
        }

        /* Seções */
        .section {
            background: #111;
            border: 1px solid #222;
            border-radius: 6px;
            padding: 7px 9px;
        }
        .section.full { grid-column: 1 / -1; }
        .section-title {
            font-size: 10px;
            color: #ff3030;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        .form-row {
            display: flex;
            gap: 5px;
            margin-bottom: 4px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-dark {
            padding: 4px 6px; background: #000; color: white;
            border: 1px solid #333; border-radius: 4px; font-size: 10px;
        }
        .select-dark {
            padding: 4px 6px; background: #000; color: white;
            border: 1px solid #333; border-radius: 4px; font-size: 10px;
            height: 26px;
        }
        .btn { padding: 4px 9px; border: none; color: white; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 10px; }
        .btn-red { background: #ff3030; }
        .btn-red:hover { background: #d62424; }
        .btn-green { background: #27ae60; }
        .btn-green:hover { background: #219653; }
        .btn-gray { background: #333; }
        .btn-gray:hover { background: #444; }
        .btn-blue { background: #2980b9; }
        .btn-blue:hover { background: #2471a3; }
        .btn-yellow { background: #f39c12; color: #000; }
        .btn-yellow:hover { background: #e08e0b; }
        .btn-test { background: #27ae60; color: white; border: none; padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .btn-del { color: #ff3030; cursor: pointer; font-weight: bold; background: transparent; border: none; padding: 0 2px; font-size: 13px; }

        /* Botão abrir jogo */
        #btn-open-game {
            display: block; width: 100%; padding: 7px;
            background: #111; border: 2px solid #ff3030;
            color: #ff3030; font-size: 12px; font-weight: 900;
            letter-spacing: 1px; border-radius: 6px; cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s, color 0.15s;
        }
        #btn-open-game:hover, #btn-open-game.active { background: #ff3030; color: #fff; }

        /* Botão Kings */
        #btn-kings {
            padding: 6px; background: #222; border: 1px solid #ffd700;
            color: #ffd700; cursor: pointer; border-radius: 5px; font-size: 11px;
            font-weight: 900; width: 100%;
        }
        #btn-kings.active { background: #ff3030; color: #fff; border-color: #8b0000; }

        /* Player tools */
        #player-name { padding: 4px 6px; background: #111; border: 1px solid #333; color: #ff3030; border-radius: 4px; font-size: 10px; width: 100%; text-transform: uppercase; margin-bottom: 4px; }

        /* Audio */
        #btn-audio { padding: 4px 8px; background: #111; border: 1px solid #333; color: #fff; cursor: pointer; border-radius: 4px; font-size: 10px; font-weight: bold; width: 100%; margin-top: 4px; }

        /* Loop */
        .loop-container { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: bold; color: #ffd700; cursor: pointer; user-select: none; }
        .loop-container input { cursor: pointer; width: 12px; height: 12px; accent-color: #ffd700; }

        /* Event list */
        .event-list-container { max-height: 80px; overflow-y: auto; background: #090909; border: 1px solid #222; border-radius: 4px; padding: 2px 4px; }
        .event-item { display: flex; justify-content: space-between; align-items: center; padding: 3px 4px; font-size: 10px; border-bottom: 1px solid #161616; }
        .event-item:last-child { border-bottom: none; }
        .event-actions-group { display: flex; gap: 4px; align-items: center; }

        /* Grid de ações rápidas */
        .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .quick-btn {
            padding: 5px 2px; border: 1px solid #333; background: #161616;
            color: white; cursor: pointer; border-radius: 5px; font-size: 9px;
            font-weight: bold; text-align: center; transition: background 0.15s;
        }
        .quick-btn:hover { background: #222; }
        .quick-btn.cerol { border-color: #ff66cc; color: #ff66cc; }
        .quick-btn.cerol:hover { background: rgba(255,102,204,0.1); }
        .quick-btn.fino { border-color: #66ff66; color: #66ff66; }
        .quick-btn.fino:hover { background: rgba(102,255,102,0.1); }
        .quick-btn.chilena { border-color: #ffff66; color: #ffff66; }
        .quick-btn.chilena:hover { background: rgba(255,255,102,0.1); }

        label { font-size: 10px; color: #aaa; white-space: nowrap; }

        /* Ranking mini */
        #mini-ranking { font-size: 10px; color: #888; overflow-y: auto; max-height: 100%; }
        .rank-line { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
        .rank-line:last-child { border-bottom: none; }
        .rank-name { color: #fff; }
        .rank-cuts { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<h1>🪁 Batalha de Pipas — Painel</h1>

<!-- Status -->

        <div class="form-row">
            <select id="shareActionSelect" class="select-dark" style="flex:1;">
                <option value="SPAWN_RANDOM">Spawn Aleat.</option>

                <option value="SPAWN_RANDOM">Spawn Aleat.</option>

<script>
// ============================================================
// CANAL DE COMUNICAÇÃO COM O JOGO
// ============================================================
const gameChannel = new BroadcastChannel('batalha_pipas');
let jogoOnline = false;
let festivalAtivo = false;
let audioMutado = false;

// Ping periódico para verificar se o jogo está aberto
function pingGame() {
    gameChannel.postMessage({ type: 'PING' });
}
setInterval(pingGame, 3000);
pingGame();

// Timeout para marcar jogo offline se não responder
let gameOnlineTimeout = null;
function markGameOnline() {
    jogoOnline = true;
    document.getElementById('gameDot').className = 'dot online';
    clearTimeout(gameOnlineTimeout);
    gameOnlineTimeout = setTimeout(() => {
        jogoOnline = false;
        document.getElementById('gameDot').className = 'dot';
    }, 7000);
}

gameChannel.onmessage = (event) => {
    const msg = event.data;
    if (!msg || !msg.type) return;
    switch(msg.type) {
        case 'PONG':
            markGameOnline();
            break;
        case 'GAME_STATE':
            markGameOnline();
            festivalAtivo = msg.festivalAtivo;
            updateFestivalBtn();
            document.getElementById('stat-pipas').textContent = msg.pipasCount;
            document.getElementById('stat-fila').textContent = msg.queueCount;
            break;
        case 'WIN_STATS_UPDATE':
            updateMiniRanking(msg.winStats);
            break;
        case 'FESTIVAL_CHANGED':
            festivalAtivo = msg.festivalAtivo;
            updateFestivalBtn();
            break;
    }
};

function updateFestivalBtn() {
    const btn = document.getElementById('btn-kings');
    const dot = document.getElementById('festivalDot');
    if (festivalAtivo) {
        btn.innerHTML = "👑 KINGS: ATIVADO";
        btn.classList.add('active');
        dot.className = 'dot festival';
    } else {
        btn.innerHTML = "👑 KINGS: DESATIVADO";
        btn.classList.remove('active');
        dot.className = 'dot';
    }
}

function updateMiniRanking(winStats) {
    if (!winStats) return;
    const sorted = Object.entries(winStats).sort((a, b) => b[1].cuts - a[1].cuts);
    const container = document.getElementById('mini-ranking');
    if (sorted.length === 0) {
        container.innerHTML = '<em style="color:#555;">Nenhum corte registrado ainda.</em>';
        return;
    }
    const medals = ['🥇','🥈','🥉'];
    container.innerHTML = sorted.slice(0, 10).map(([name, data], i) => 
        `<div class="rank-line"><span class="rank-name">${medals[i] || `${i+1}º`} ${name}</span><span class="rank-cuts">${data.cuts} cortes</span></div>`
    ).join('');
}

function send(msg) {
    gameChannel.postMessage(msg);
}

// ============================================================
// ESTADO LOCAL
// ============================================================
let eventMappings = JSON.parse(localStorage.getItem('pipa_events')) || { 
    "membro": "SPAWN_RANDOM", 
    "compartilhar": "SPAWN_RANDOM",
    "5655": "CEROL", 
    "rose": "CEROL",
    "curtida_like": "CURA_15"
};
let likeThreshold = parseInt(localStorage.getItem('pipa_like_threshold')) || 10;
let duracaoPrepMinutos = parseInt(localStorage.getItem('pipa_fest_prep')) || 2;
let duracaoCombatMinutos = parseInt(localStorage.getItem('pipa_fest_combat')) || 5;

// Inicializa campos
document.getElementById('likeThresholdInput').value = likeThreshold;
document.getElementById('festPrepInput').value = duracaoPrepMinutos;
document.getElementById('festCombatInput').value = duracaoCombatMinutos;
if(eventMappings["curtida_like"]) document.getElementById('likeActionSelect').value = eventMappings["curtida_like"];
if(eventMappings["membro"]) document.getElementById('memberActionSelect').value = eventMappings["membro"];
if(eventMappings["compartilhar"]) document.getElementById('shareActionSelect').value = eventMappings["compartilhar"];
renderEvents();

// Envia configurações ao jogo quando ele entrar online
setTimeout(() => sendAllSettings(), 500);

function sendAllSettings() {
    send({
        type: 'UPDATE_SETTINGS',
        eventMappings,
        likeThreshold,
        festPrepMin: duracaoPrepMinutos,
        festCombatMin: duracaoCombatMinutos,
    });
}

// ============================================================
// FUNÇÕES DO PAINEL
// ============================================================

function toggleFestival() {
    send({ type: 'TOGGLE_FESTIVAL' });
}

function sendLoopState() {
    const enabled = document.getElementById('festivalLoopCheck').checked;
    send({ type: 'FESTIVAL_LOOP', enabled });
}

function toggleAudio() {
    audioMutado = !audioMutado;
    const btn = document.getElementById('btn-audio');
    btn.innerHTML = audioMutado ? "🔇 ÁUDIO: MUTADO" : "🔊 ÁUDIO: LIGADO";
    btn.style.color = audioMutado ? "#ff3030" : "#fff";
    send({ type: 'TOGGLE_AUDIO', muted: audioMutado });
}

function playerSelfSpawn() {
    const n = document.getElementById('player-name').value.trim();
    if (!n) return alert("Digite o nome do jogador!");
    send({ type: 'SELF_SPAWN', user: n });
}

function playerSpawnLarge() {
    const n = document.getElementById('player-name').value.trim();
    if (!n) return alert("Digite o nome do jogador!");
    send({ type: 'EXECUTE_ACTION', action: 'SPAWN_LARGE', user: n, avatar: 'https://www.tiktok.com/favicon.ico' });
}

function quickAction(action) {
    const n = document.getElementById('player-name').value.trim();
    if (!n) return alert("Digite o nome do jogador primeiro!");
    send({ type: 'EXECUTE_ACTION', action, user: n, avatar: 'https://www.tiktok.com/favicon.ico' });
}

function resetRanking() {
    if(confirm("Deseja zerar o placar de cortes?")) {
        send({ type: 'RESET_RANKING' });
        document.getElementById('mini-ranking').innerHTML = '<em style="color:#555;">Placar zerado.</em>';
    }
}

function saveFestivalDurations() {
    duracaoPrepMinutos = parseInt(document.getElementById('festPrepInput').value) || 2;
    duracaoCombatMinutos = parseInt(document.getElementById('festCombatInput').value) || 5;
    localStorage.setItem('pipa_fest_prep', duracaoPrepMinutos);
    localStorage.setItem('pipa_fest_combat', duracaoCombatMinutos);
    send({ type: 'UPDATE_SETTINGS', festPrepMin: duracaoPrepMinutos, festCombatMin: duracaoCombatMinutos });
    alert("Tempos do Festival salvos!");
}

function saveLikeConfig() {
    likeThreshold = parseInt(document.getElementById('likeThresholdInput').value) || 10;
    localStorage.setItem('pipa_like_threshold', likeThreshold);
    eventMappings["curtida_like"] = document.getElementById('likeActionSelect').value;
    localStorage.setItem('pipa_events', JSON.stringify(eventMappings));
    send({ type: 'UPDATE_SETTINGS', likeThreshold, eventMappings });
    renderEvents();
}

function saveMemberConfig() {
    eventMappings["membro"] = document.getElementById('memberActionSelect').value;
    localStorage.setItem('pipa_events', JSON.stringify(eventMappings));
    send({ type: 'UPDATE_SETTINGS', eventMappings });
    renderEvents();
}

function saveShareConfig() {
    eventMappings["compartilhar"] = document.getElementById('shareActionSelect').value;
    localStorage.setItem('pipa_events', JSON.stringify(eventMappings));
    send({ type: 'UPDATE_SETTINGS', eventMappings });
    renderEvents();
}

function addEvent() { 
    const cmd = document.getElementById('cmdInput').value.trim().toLowerCase(); 
    const act = document.getElementById('actionSelect').value; 
    if(cmd) { 
        eventMappings[cmd] = act; 
        localStorage.setItem('pipa_events', JSON.stringify(eventMappings)); 
        send({ type: 'UPDATE_SETTINGS', eventMappings });
        renderEvents(); 
    } 
}

function removeEvent(cmd) { 
    delete eventMappings[cmd]; 
    localStorage.setItem('pipa_events', JSON.stringify(eventMappings)); 
    send({ type: 'UPDATE_SETTINGS', eventMappings });
    renderEvents(); 
}

function renderEvents() { 
    document.getElementById('event-list').innerHTML = Object.entries(eventMappings).map(([cmd, act]) => {
        return `<div class="event-item"><span><strong>${cmd}</strong> &rarr; ${act}</span><div class="event-actions-group"><button class="btn-test" onclick="testTrigger('${cmd}')">Testar</button><button class="btn-del" onclick="removeEvent('${cmd}')">&times;</button></div></div>`;
    }).join(''); 
}

function testTrigger(key) {
    const action = eventMappings[key];
    if (!action) return;
    let testUser = "TESTE_LIVE";
    if(key === "curtida_like") testUser = "LIKES_TEST";
    if(key === "membro") testUser = "MEMBRO_TEST";
    if(key === "compartilhar") testUser = "SHARE_TEST";
    send({ type: 'EXECUTE_ACTION', action, user: testUser, avatar: 'https://www.tiktok.com/favicon.ico' });
}

function syncGiftInput() {
    const sel = document.getElementById('giftSelector').value;
    if(sel && sel !== "CUSTOM") document.getElementById('cmdInput').value = sel;
    else if(sel === "CUSTOM") document.getElementById('cmdInput').value = "";
}

// ============================================================
// TIKFINITY — conecta aqui no painel e repassa ao jogo
// ============================================================
let likeCounter = 0;
let likeCooldown = false;

function connectTikFinity() {
    const socket = new WebSocket('ws://localhost:21213/');
    socket.onopen = () => { 
        document.getElementById('tikfinityDot').className = 'dot tikfinity';
        send({ type: 'TIKFINITY_STATUS', online: true });
    };
    socket.onmessage = (event) => {
        const res = JSON.parse(event.data);
        const d = res.data || res;
        if (!d) return;
        
        let user = d.nickname || d.uniqueId || "Jogador";
        let avatar = d.profilePictureUrl || d.profilePicUrl || d.avatar || null;
        const ev = (res.event || "").toLowerCase();
        
        if (ev === "gift") {
            const giftId = String(d.giftId || "");
            const giftName = String(d.giftName || "").toLowerCase().trim();
            if (eventMappings[giftId]) { send({ type: 'EXECUTE_ACTION', action: eventMappings[giftId], user, avatar }); } 
            else if (eventMappings[giftName]) { send({ type: 'EXECUTE_ACTION', action: eventMappings[giftName], user, avatar }); }
            return; 
        }
        
        let triggerKey = "";
        let count = 1;
        if (ev === "chat") triggerKey = (d.comment || "").toLowerCase().trim();
        else if (ev === "command") triggerKey = (d.command || "").toLowerCase();
        else if (ev === "share") triggerKey = "compartilhar";
        else if (ev === "like") { triggerKey = "curtida_like"; count = parseInt(d.likeCount) || 1; }
        else triggerKey = ev;

        if (!triggerKey) return;
        const action = eventMappings[triggerKey];
        if (action) {
            if (triggerKey === "curtida_like") {
                if (likeCooldown) return;
                likeCounter += count;
                if (likeCounter >= likeThreshold) {
                    likeCooldown = true;
                    send({ type: 'EXECUTE_ACTION', action, user, avatar });
                    setTimeout(() => { likeCooldown = false; likeCounter = 0; }, 2000);
                }
            } else {
                send({ type: 'EXECUTE_ACTION', action, user, avatar });
            }
        }
    };
    socket.onclose = () => { 
        document.getElementById('tikfinityDot').className = 'dot';
        send({ type: 'TIKFINITY_STATUS', online: false });
        setTimeout(connectTikFinity, 5000); 
    };
}

connectTikFinity();

// ============================================================
// CONTROLE DA JANELA DO JOGO (Electron)
// ============================================================
let gameWindowOpen = false;

function toggleGame() {
    if (window.electronAPI) {
        window.electronAPI.toggleGameWindow();
        gameWindowOpen = !gameWindowOpen;
        updateGameBtn();
    } else {
        // Fallback browser: abre popup
        window.open('jogo.html', 'jogo', 'width=1280,height=800');
    }
}

function updateGameBtn() {
    const btn = document.getElementById('btn-open-game');
    if (gameWindowOpen) {
        btn.textContent = '🎮 FECHAR JOGO';
        btn.classList.add('active');
    } else {
        btn.textContent = '🎮 ABRIR JOGO';
        btn.classList.remove('active');
    }
}

if (window.electronAPI) {
    window.electronAPI.onGameClosed(() => {
        gameWindowOpen = false;
        updateGameBtn();
    });
}
